name: BarBridge
options:
  bundleIdPrefix: com.barbridge
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
targets:
  BarBridge:
    type: application
    platform: macOS
    sources:
      - path: BarBridge
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: false
        PRODUCT_BUNDLE_IDENTIFIER: com.barbridge.app
        PRODUCT_NAME: BarBridge
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
    entitlements:
      path: BarBridge/BarBridge.entitlements
